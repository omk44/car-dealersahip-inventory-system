services:
  - type: web
    name: autoaura-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # Must be provided in dashboard
      - key: JWT_SECRET
        sync: false # Must be provided in dashboard
